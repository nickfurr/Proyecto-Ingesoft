<div class="login-page d-flex justify-content-center align-items-center bg-custom container-fluid">
  <div class="card shadow-lg border-0 login-card">
    <div class="card-body p-4 p-md-5">

      <ul class="nav nav-pills nav-justified mb-4">
        <li class="nav-item">
          <a class="nav-link active" href="#">Login</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Register</a>
        </li>
      </ul>

      <form (ngSubmit)="login()">
        <h3 class="text-center mb-4">Iniciar sesión</h3>

        <div class="mb-3">
          <label for="loginName" class="form-label">Correo o usuario</label>
          <input
            type="email"
            id="loginName"
            class="form-control"
            [(ngModel)]="email"
            name="email"
            required
          />
          @if (errorMessage) {
            <div class="alert alert-danger">
              {{ errorMessage }}
            </div>
          }
        </div>

        <div class="mb-3">
          <label for="loginPassword" class="form-label">Contraseña</label>
          <input
            type="password"
            id="loginPassword"
            class="form-control"
            [(ngModel)]="password"
            name="email"
            required
          />
          @if (errorMessage) {
            <div class="alert alert-danger">
              {{ errorMessage }}
            </div>
          }
        </div>

        <div class="row mb-4">
          <div class="col-md-6">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="loginCheck" checked />
              <label class="form-check-label" for="loginCheck">
                Recordarme
              </label>
            </div>
          </div>

          <div class="col-md-6 text-md-end mt-2 mt-md-0">
            <a href="#">¿Olvidaste tu contraseña?</a>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3">
          Ingresar
        </button>

        <div class="text-center">
          <p class="mb-0">¿No tienes cuenta? <a href="#">Regístrate</a></p>
        </div>
      </form>

    </div>
  </div>
</div>
